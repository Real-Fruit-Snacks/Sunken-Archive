        margin-bottom: 1rem;

      }
      .filter-btn {
        background: var(--surface0);
        border: 1px solid var(--surface1);
        color: var(--subtext0);
        padding: 0.25rem 0.6rem;
        border-radius: 5px;
        cursor: pointer;
        font-size: 0.8rem;
      }
      .filter-btn:hover {
        color: var(--text);
      }
      .filter-btn.active {
        border-color: var(--peach);
        color: var(--peach);
      }

      .count {
        font-size: 0.8rem;
        color: var(--overlay0);
        margin-bottom: 0.75rem;
      }

      .port-list {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }
      .port-item {
        display: grid;
        grid-template-columns: 70px 1fr auto;
        gap: 0.75rem;
        align-items: center;
        background: var(--mantle);
        border-radius: 6px;
        padding: 0.6rem 0.75rem;
      }
      .port-num {
        font-family: var(--font-mono);
        font-size: 1rem;
        font-weight: 600;
        color: var(--peach);
      }
      .port-name {
        font-size: 0.9rem;
      }
      .port-desc {
        font-size: 0.8rem;
        color: var(--subtext0);
      }
      .port-proto {
        font-family: var(--font-mono);
        font-size: 0.75rem;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        background: var(--surface0);
      }
      .port-proto.tcp {
        color: var(--blue);
      }
      .port-proto.udp {
        color: var(--green);
      }
      .port-proto.both {
        color: var(--mauve);
      }

        display: inline-block;
        font-size: 0.7rem;
        padding: 0.1rem 0.35rem;
        border-radius: 3px;
        margin-left: 0.4rem;

      const searchInput = document.getElementById("searchInput")
      const portList = document.getElementById("portList")
      const countDisplay = document.getElementById("countDisplay")
      let activeCat = "all"

      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"))
          btn.classList.add("active")
          activeCat = btn.dataset.cat
          render()
        })
      })

      function render() {
        const q = searchInput.value.toLowerCase()
        const filtered = ports.filter((p) => {
          if (activeCat !== "all" && p.cat !== activeCat) return false
          if (!q) return true
          return (
            String(p.port).includes(q) ||
            p.name.toLowerCase().includes(q) ||
            p.desc.toLowerCase().includes(q) ||
            p.proto.includes(q)
          )
        })

        countDisplay.textContent = `Showing ${filtered.length} port${filtered.length !== 1 ? "s" : ""}`

        portList.innerHTML = filtered
          .map(
            (p) => `
        <div class="port-item">
          <div class="port-num">${p.port}</div>
          <div>
            <div class="port-name">${p.name}<span class="cat-badge cat-${p.cat}">${p.cat}</span></div>
            <div class="port-desc">${p.desc}</div>
          </div>
          <div class="port-proto ${p.proto}">${p.proto.toUpperCase()}</div>
        </div>
      `,
          )
          .join("")
      }

      searchInput.addEventListener("input", render)
      render()
