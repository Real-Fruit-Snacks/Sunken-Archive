<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Encoder/Decoder — Sunken Archive</title>
  <style>
    :root {
      --base: #1e1e2e; --mantle: #181825; --surface0: #313244; --surface1: #45475a;
      --overlay0: #6c7086; --text: #cdd6f4; --subtext0: #a6adc8;
      --peach: #fab387; --green: #a6e3a1; --blue: #89b4fa; --red: #f38ba8;
      --font: "Source Sans Pro", -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: "IBM Plex Mono", "Fira Code", monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--base); color: var(--text); font-family: var(--font); padding: 0.5rem 0; display: flex; justify-content: center; }
    .container { max-width: 720px; width: 100%; }

    .mode-toggle { display: flex; margin-bottom: 1rem; border-radius: 8px; overflow: hidden; border: 2px solid var(--surface1); width: fit-content; }
    .mode-btn { background: var(--surface0); border: none; color: var(--subtext0); padding: 0.5rem 1.25rem; cursor: pointer; font-family: var(--font); font-size: 0.9rem; }
    .mode-btn:hover { color: var(--text); }
    .mode-btn.active { background: var(--peach); color: var(--base); font-weight: 600; }

    .panel { position: relative; margin-bottom: 0.75rem; }
    .panel-label { font-size: 0.75rem; color: var(--subtext0); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; }
    textarea {
      width: 100%; min-height: 100px; padding: 0.75rem 1rem; font-size: 0.95rem; font-family: var(--font-mono);
      background: var(--surface0); border: 2px solid var(--surface1); border-radius: 8px; color: var(--text); outline: none; resize: vertical;
    }
    textarea:focus { border-color: var(--peach); }
    textarea::placeholder { color: var(--overlay0); }
    textarea.error { border-color: var(--red); }

    .copy-btn {
      position: absolute; top: 1.75rem; right: 0.5rem; background: var(--surface1); border: none;
      color: var(--subtext0); padding: 0.25rem 0.6rem; border-radius: 5px; cursor: pointer; font-family: var(--font); font-size: 0.75rem;
    }
    .copy-btn:hover { color: var(--text); }
    .copy-btn.copied { color: var(--green); }

    .error-msg { color: var(--red); font-size: 0.85rem; margin-top: 0.25rem; }
    .arrow { text-align: center; color: var(--overlay0); font-size: 1.2rem; padding: 0.25rem; }

    .encode-opts { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .encode-opts label { font-size: 0.85rem; color: var(--subtext0); display: flex; align-items: center; gap: 0.4rem; cursor: pointer; }
    .encode-opts input[type="radio"] { accent-color: var(--peach); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/Sunken-Archive/" style="display:inline-block;margin-bottom:1rem;color:var(--peach);text-decoration:none;font-size:0.9rem;">← Sunken Archive</a>
    <div class="mode-toggle">
      <button class="mode-btn active" id="encodeBtn">Encode</button>
      <button class="mode-btn" id="decodeBtn">Decode</button>
    </div>

    <div class="encode-opts" id="encodeOpts">
      <label><input type="radio" name="encType" value="component" checked> encodeURIComponent</label>
      <label><input type="radio" name="encType" value="uri"> encodeURI</label>
    </div>

    <div class="panel">
      <div class="panel-label" id="inputLabel">Plain Text</div>
      <textarea id="inputArea" placeholder="Type or paste text here..."></textarea>
    </div>
    <div class="arrow">&#8595;</div>
    <div class="panel">
      <div class="panel-label" id="outputLabel">URL Encoded</div>
      <textarea id="outputArea" readonly placeholder="Result appears here..."></textarea>
      <button class="copy-btn" id="copyBtn">Copy</button>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <script>
    const inputArea = document.getElementById("inputArea");
    const outputArea = document.getElementById("outputArea");
    const inputLabel = document.getElementById("inputLabel");
    const outputLabel = document.getElementById("outputLabel");
    const encodeBtn = document.getElementById("encodeBtn");
    const decodeBtn = document.getElementById("decodeBtn");
    const copyBtn = document.getElementById("copyBtn");
    const errorMsg = document.getElementById("errorMsg");
    const encodeOpts = document.getElementById("encodeOpts");
    let mode = "encode";

    function getEncType() { return document.querySelector('input[name="encType"]:checked').value; }

    function setMode(m) {
      mode = m;
      encodeBtn.classList.toggle("active", m === "encode");
      decodeBtn.classList.toggle("active", m === "decode");
      inputLabel.textContent = m === "encode" ? "Plain Text" : "URL Encoded";
      outputLabel.textContent = m === "encode" ? "URL Encoded" : "Decoded Text";
      encodeOpts.style.display = m === "encode" ? "flex" : "none";
      convert();
    }

    function convert() {
      const val = inputArea.value;
      errorMsg.textContent = "";
      outputArea.classList.remove("error");
      if (!val) { outputArea.value = ""; return; }
      try {
        if (mode === "encode") {
          outputArea.value = getEncType() === "component" ? encodeURIComponent(val) : encodeURI(val);
        } else {
          outputArea.value = decodeURIComponent(val.trim());
        }
      } catch (e) {
        outputArea.value = "";
        errorMsg.textContent = "Invalid encoded string";
        outputArea.classList.add("error");
      }
    }

    encodeBtn.addEventListener("click", () => setMode("encode"));
    decodeBtn.addEventListener("click", () => setMode("decode"));
    inputArea.addEventListener("input", convert);
    document.querySelectorAll('input[name="encType"]').forEach(r => r.addEventListener("change", convert));

    copyBtn.addEventListener("click", () => {
      if (!outputArea.value) return;
      navigator.clipboard.writeText(outputArea.value).then(() => {
        copyBtn.textContent = "Copied!"; copyBtn.classList.add("copied");
        setTimeout(() => { copyBtn.textContent = "Copy"; copyBtn.classList.remove("copied"); }, 1500);
      });
    });
  </script>
</body>
</html>
